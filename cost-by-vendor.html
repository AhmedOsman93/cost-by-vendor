<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cost by Vendor · Growth Marketing</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pf-red:    #D94F15;
      --pf-red-dk: #B83E0E;
      --bg:        #F4F5F9;
      --surface:   #FFFFFF;
      --border:    #E4E7EF;
      --text-1:    #111827;
      --text-2:    #6B7280;
      --text-3:    #9CA3AF;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .pf-logo {
      width: 34px; height: 34px;
      background: var(--pf-red);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: 13px; letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .header-title   { font-size: 15px; font-weight: 700; color: var(--text-1); }
    .header-sub     { font-size: 11px; color: var(--text-2); margin-top: 1px; }
    .fetch-badge {
      font-size: 11px; color: var(--text-3);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px;
    }

    /* ── CONTROLS ────────────────────────────── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 32px;
      display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
    }
    .ctrl-group { display: flex; align-items: center; gap: 7px; }
    .ctrl-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-2);
    }
    input[type="date"] {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 12px; color: var(--text-1);
      background: var(--bg);
      outline: none;
      cursor: pointer;
    }
    input[type="date"]:focus { border-color: var(--pf-red); }

    .toggle {
      display: flex; border: 1px solid var(--border);
      border-radius: 7px; overflow: hidden; background: var(--bg);
    }
    .toggle-btn {
      padding: 5px 13px; font-size: 12px; font-weight: 500;
      border: none; background: transparent; cursor: pointer; color: var(--text-2);
      transition: background 0.12s, color 0.12s;
    }
    .toggle-btn.active { background: var(--pf-red); color: #fff; }
    .toggle-btn:hover:not(.active) { background: #ECEEF4; }

    .shortcuts { display: flex; gap: 6px; margin-left: 2px; }
    .shortcut-btn {
      padding: 5px 10px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 11px; color: var(--text-2); background: var(--bg); cursor: pointer;
      transition: all 0.12s;
    }
    .shortcut-btn:hover { border-color: var(--pf-red); color: var(--pf-red); background: #FFF5F0; }

    .refresh-btn {
      margin-left: auto;
      padding: 6px 14px; border: none; border-radius: 7px;
      background: var(--pf-red); color: #fff;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background 0.12s;
      display: flex; align-items: center; gap: 6px;
    }
    .refresh-btn:hover { background: var(--pf-red-dk); }
    .refresh-btn svg { width: 13px; height: 13px; }

    /* ── MAIN ────────────────────────────────── */
    .main { padding: 24px 32px; }

    /* ── KPI CARDS ───────────────────────────── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .kpi-card-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-3); margin-bottom: 10px;
    }
    .kpi-card-value { font-size: 26px; font-weight: 800; color: var(--text-1); line-height: 1; }
    .kpi-card-sub   { font-size: 12px; color: var(--text-2); margin-top: 6px; }
    .kpi-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }

    /* ── CHART CARD ──────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .card-head {
      padding: 16px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .card-title { font-size: 13px; font-weight: 700; color: var(--text-1); }
    .card-body  { padding: 16px 20px; }

    .vendor-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
    .vchip {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px; border: 1.5px solid;
      font-size: 11px; font-weight: 600; cursor: pointer;
      transition: opacity 0.12s;
      user-select: none;
    }
    .vchip.active   { opacity: 1; }
    .vchip.inactive { opacity: 0.28; }
    .vchip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .chart-wrap { position: relative; height: 360px; }

    /* ── TABLE ───────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 16px; text-align: left;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-3);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    thead th.r { text-align: right; }
    tbody td {
      padding: 12px 16px;
      font-size: 12px; color: var(--text-1);
      border-bottom: 1px solid #F1F2F6;
    }
    tbody td.r { text-align: right; color: var(--text-2); font-variant-numeric: tabular-nums; }
    tbody td.r.bold { color: var(--text-1); font-weight: 700; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #FAFBFD; }
    .total-row td { font-weight: 700; background: var(--bg) !important; }
    .vendor-cell { display: flex; align-items: center; gap: 8px; }
    .v-swatch { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* progress bar in table */
    .bar-wrap { display: flex; align-items: center; gap: 8px; min-width: 100px; }
    .bar-bg   { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; }
    .bar-pct  { font-size: 11px; color: var(--text-2); min-width: 36px; text-align: right; }

    /* ── LOADING / ERROR ─────────────────────── */
    .loader {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; height: 200px; color: var(--text-3); font-size: 13px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border); border-top-color: var(--pf-red);
      border-radius: 50%; animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #FEF2F2; border: 1px solid #FECACA;
      border-radius: 10px; padding: 16px 20px;
      color: #B91C1C; font-size: 13px; line-height: 1.6;
    }

    /* ── FOOTER ──────────────────────────────── */
    footer {
      text-align: center; padding: 16px 32px;
      font-size: 11px; color: var(--text-3);
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    /* ── COLUMN INSPECTOR ────────────────────────── */
    .col-inspector {
      padding: 5px 32px;
      font-size: 11px;
      color: var(--text-2);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: none;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .col-inspector.visible { display: flex; }
    .ci-label { font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.4px; }
    .ci-val {
      font-family: 'SFMono-Regular', Consolas, monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      color: var(--text-1);
      font-size: 10px;
    }
    .ci-sep { color: var(--border); }
    .ci-toggle {
      margin-left: auto; font-size: 10px; color: var(--pf-red);
      cursor: pointer; text-decoration: underline;
      background: none; border: none; padding: 0;
    }
    .ci-all-cols {
      width: 100%; margin-top: 4px;
      font-size: 10px; color: var(--text-2);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px;
      line-height: 2.2; display: none;
    }
    .ci-all-cols.open { display: block; }
    .ci-tab-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600;
      border: 1px solid;
    }
    .ci-tab-chip.ok   { color: #059669; border-color: #6EE7B7; background: #ECFDF5; }
    .ci-tab-chip.fail { color: #B91C1C; border-color: #FECACA; background: #FEF2F2; }
    .ci-tab-chip-dot  { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .ci-tab-chip.ok   .ci-tab-chip-dot { background: #059669; }
    .ci-tab-chip.fail .ci-tab-chip-dot { background: #B91C1C; }

    /* ── RESPONSIVE ──────────────────────────── */
    @media (max-width: 640px) {
      .header, .controls, .main { padding-left: 16px; padding-right: 16px; }
      .kpi-card-value { font-size: 20px; }
      .chart-wrap { height: 260px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->

<script>
/* ─────────────────────────────────────────────────

───────────────────────────────────────────────── */
const SHEET_ID  = '1svRcPjNERO32cVtZcBTdH-dVIfJ2CxNIpGqHSLBezNY';
const GID       = '1888284710';
const CSV_URL   = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;
const CSV_URL_B = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

// ── COLUMN OVERRIDES ───────────────────────────────────────────────────────────

const COST_COL   = null;   // exact column name for the cost in USD

// ── VENDOR ALIASES ─────────────────────────────────────────────────────────────
// Map raw channel values → canonical vendor names in the dashboard.
// Matched case-sensitively first, then case-insensitively.
// Add entries here to merge channels that belong to the same vendor.
const VENDOR_ALIASES = {

  'facebook cost':  'Meta',
  'Meta Installs':  'Meta',
  'meta installs':  'Meta',

};

// ── VENDOR TABS ────────────────────────────────────────────────────────────
// One entry per vendor sheet tab. The dashboard fetches all tabs in parallel.
// sheetName must match exactly (case-sensitive) the tab name in Google Sheets.
// Multiple entries with the same vendor name are merged automatically (e.g. Meta).
const VENDOR_TABS = [
  { vendor: 'Google Ads',       sheetName: 'Google cost' },
  { vendor: 'Meta',             sheetName: 'Facebook cost' },
  { vendor: 'Meta',             sheetName: 'Meta Installs' },
  { vendor: 'RTB House',        sheetName: 'RTB house cost' },
  { vendor: 'Criteo',           sheetName: 'Criteo cost' },
  { vendor: 'Apple Search Ads', sheetName: 'Apple ads' },
  { vendor: 'TikTok',           sheetName: 'TikTok cost' },
  { vendor: 'Snapchat',         sheetName: 'Snapchat cost' },
  { vendor: 'Reddit',           sheetName: 'Reddit cost' },
];

// ── EMBEDDED DATA ─────────────────────────────────────────────────────────────
// update-dashboard.py replaces this line daily with pre-fetched JSON rows.
// When set, the dashboard opens instantly from file:// with no network needed.

const EMBEDDED_DATA = null; // UPDATER_PLACEHOLDER

/* ─────────────────────────────────────────────────
   VENDOR COLOUR MAP
───────────────────────────────────────────────── */
const KNOWN_COLORS = {
  google:    '#4285F4',
  meta:      '#1877F2',
  facebook:  '#1877F2',
  instagram: '#C13584',
  tiktok:    '#2EC8A2',
  'rtb house': '#FF6B35',
  rtbhouse:  '#FF6B35',
  criteo:    '#F76A2D',
  criterio:  '#F76A2D',
  snapchat:  '#FFCB00',
  twitter:   '#1DA1F2',
  x:         '#555555',
  pinterest: '#E60023',
  linkedin:  '#0A66C2',
  youtube:   '#FF0000',
  apple:     '#555555',
  bing:      '#008272',
  microsoft: '#00BCF2',
};
const PALETTE = [
  '#4285F4','#EA4335','#34A853','#FBBC04','#9C27B0',
  '#00BCD4','#FF5722','#607D8B','#795548','#009688',
  '#E91E63','#3F51B5','#FF9800','#8BC34A','#673AB7',
];

/* ─────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────── */
let allRows    = [];
let colorMap   = {};
let activeVendors = new Set();
let granularity   = 'weekly';
let chartInst     = null;
let lastColInfo   = null;   // populated by parseSheet (fallback) — drives column inspector UI
let lastTabStatus = null;   // populated by loadMultiTab — drives tab-status inspector UI

/* ─────────────────────────────────────────────────
   UTILITY
───────────────────────────────────────────────── */
function parseDate(s) {
  if (!s) return null;
  const str = String(s).trim();
  if (!str) return null;

  // Google Sheets / Excel serial number (integers ~30000–60000 = years 1982–2064)
  if (/^\d+$/.test(str)) {
    const n = parseInt(str, 10);
    if (n > 30000 && n < 60000) {
      return new Date(Date.UTC(1899, 11, 30) + n * 86400000);
    }
    return null; // small integers (day-of-month) are not stand-alone dates
  }

  // ISO: YYYY-MM-DD — parse as UTC to avoid timezone shifts
  if (/^\d{4}-\d{2}-\d{2}/.test(str)) {
    const d = new Date(str.slice(0, 10) + 'T00:00:00Z');
    if (!isNaN(d) && d.getFullYear() > 2000) return d;
  }

  // Slash-separated: figure out DD/MM/YYYY vs MM/DD/YYYY
  const p = str.split('/');
  if (p.length === 3) {
    const [a, b, c] = p.map(x => parseInt(x, 10));
    const yr = c > 100 ? c : c + 2000; // handle 2-digit years
    if (yr > 2000 && yr < 2060) {
      if (a > 12) return new Date(Date.UTC(yr, b - 1, a)); // definitely DD/MM
      if (b > 12) return new Date(Date.UTC(yr, a - 1, b)); // definitely MM/DD
      return new Date(Date.UTC(yr, a - 1, b));             // assume MM/DD
    }
  }

  // Natural language fallback — only accept if year looks sane
  const d = new Date(str);
  if (!isNaN(d) && d.getFullYear() > 2000 && d.getFullYear() < 2060) return d;

  return null;
}

// Construct a date from a "Month" column value ("January 2024", "2024-01", etc.)
// combined with a day-of-month integer.
function dateFromMonthAndDay(monthStr, dayNum) {
  if (!monthStr) return null;
  const m = String(monthStr).trim();
  const day = parseInt(dayNum, 10) || 1;

  // "January 2024" or "Jan 2024"
  const m1 = m.match(/([a-zA-Z]+)\s+(\d{4})/);
  if (m1) {
    const d = new Date(`${m1[1]} 1, ${m1[2]}`);
    if (!isNaN(d) && d.getFullYear() > 2000)
      return new Date(Date.UTC(d.getFullYear(), d.getMonth(), day));
  }

  // "Jan-24" or "Jan-2024" (abbreviated month + dash + 2 or 4-digit year)
  const m1b = m.match(/([a-zA-Z]+)-(\d{2,4})/);
  if (m1b) {
    const yr = m1b[2].length === 2 ? 2000 + parseInt(m1b[2], 10) : parseInt(m1b[2], 10);
    const d  = new Date(`${m1b[1]} 1, ${yr}`);
    if (!isNaN(d) && d.getFullYear() > 2000)
      return new Date(Date.UTC(d.getFullYear(), d.getMonth(), day));
  }

  // "2024-01" or "2024/01"
  const m2 = m.match(/(\d{4})[-\/](\d{1,2})/);
  if (m2) {
    const yr = parseInt(m2[1], 10), mo = parseInt(m2[2], 10);
    if (yr > 2000) return new Date(Date.UTC(yr, mo - 1, day));
  }

  // "01/2024" or "01-2024" (month first)
  const m3 = m.match(/^(\d{1,2})[-\/](\d{4})$/);
  if (m3) {
    const mo = parseInt(m3[1], 10), yr = parseInt(m3[2], 10);
    if (yr > 2000) return new Date(Date.UTC(yr, mo - 1, day));
  }

  // Maybe Month is itself a full date — use it but override the day
  const parsed = parseDate(m);
  if (parsed && parsed.getFullYear() > 2000)
    return new Date(Date.UTC(parsed.getFullYear(), parsed.getMonth(), day));

  return null;
}
const fmtDate = d => d.toISOString().split('T')[0];
const fmtUSD  = n => new Intl.NumberFormat('en-US', {
  style: 'currency', currency: 'USD', maximumFractionDigits: 0
}).format(n);

function vendorColor(name, idx) {
  const k = name.toLowerCase().trim();
  for (const [kw, c] of Object.entries(KNOWN_COLORS)) {
    if (k === kw || k.includes(kw)) return c;
  }
  return PALETTE[idx % PALETTE.length];
}

function getWeekKey(d) {
  const tmp  = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dow  = tmp.getUTCDay() || 7;
  tmp.setUTCDate(tmp.getUTCDate() + 4 - dow);
  const y    = tmp.getUTCFullYear();
  const jan1 = new Date(Date.UTC(y, 0, 1));
  const w    = Math.ceil(((tmp - jan1) / 86400000 + 1) / 7);
  return `${y}-W${String(w).padStart(2,'0')}`;
}
function weekLabel(key) {
  const [yr, wd] = key.split('-W');
  const jan1  = new Date(Date.UTC(+yr, 0, 1));
  const dayOfJan1 = jan1.getUTCDay() || 7;
  const weekStart = new Date(jan1);
  weekStart.setUTCDate(jan1.getUTCDate() + (1 - dayOfJan1) + (+wd - 1) * 7);
  return weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
}
function monthKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(key) {
  const [y, m] = key.split('-');
  return new Date(+y, +m-1, 1).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}
function dayLabel(k) {
  return new Date(k).toLocaleDateString('en-US', { month: 'short', day: 'numeric', timeZone: 'UTC' });
}

/* Find a column index by optional override name, then by ordered matcher fns.
   header    = lowercase trimmed header array
   rawHeader = original-case header array (for override matching)
   override  = exact column name string (case-insensitive) or null
   matchers  = functions (name: string) => boolean, tried in order */
function findColIdx(header, rawHeader, override, ...matchers) {
  if (override) {
    const ov = override.toLowerCase().trim();
    const i  = rawHeader.findIndex(c => c.toLowerCase().trim() === ov);
    if (i !== -1) return i;
  }
  for (const test of matchers) {
    const i = header.findIndex(test);
    if (i !== -1) return i;
  }
  return -1;
}

/* ─────────────────────────────────────────────────
   LOAD SHEET
   Priority 1: EMBEDDED_DATA baked in by the daily
               updater script (works from file://)
   Priority 2: Live fetch from Google Sheets
               (works from GitHub Pages / local server)
───────────────────────────────────────────────── */
async function fetchCSV(url) {
  const resp = await fetch(url, { cache: 'no-cache' });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  if (text.trim().startsWith('<')) throw new Error('Got HTML — sheet may not be public');
  return text;
}

async function loadSheet() {
  // ── Path 1: embedded JSON (baked in by update-dashboard.py) ──
  if (Array.isArray(EMBEDDED_DATA) && EMBEDDED_DATA.length > 0) {
    console.log('Using embedded data:', EMBEDDED_DATA.length, 'rows');
    // Embedded data is already array-of-objects; wrap for parseSheet
    return { isRaw: false, data: EMBEDDED_DATA, meta: { fields: Object.keys(EMBEDDED_DATA[0]) } };
  }

  // ── Path 2: live fetch ──
  console.log('No embedded data — attempting live fetch…');
  const attempts = [
    { label: 'gviz/tq',    url: CSV_URL },
    { label: 'export CSV', url: CSV_URL_B },
  ];
  let lastErr;
  for (const { label, url } of attempts) {
    try {
      const text = await fetchCSV(url);
      console.log(`Loaded via: ${label}`);
      // Parse as raw 2D array so we can handle any sheet layout
      const raw = Papa.parse(text, { skipEmptyLines: false });
      return { isRaw: true, data: raw.data };
    } catch (e) {
      console.warn(`[${label}] failed:`, e.message);
      lastErr = e;
    }
  }

  throw new Error(
    `Could not load sheet data (${lastErr?.message}).\n\n` +
    'Check that the Google Sheet is set to "Anyone with the link can view" ' +
    'under Share settings, then refresh this page.'
  );
}

/* ── parseVendorTab ───────────────────────────────────────────────────────────
   Extract { date, dateKey, vendor, cost } rows from a single-vendor tab.
   The vendor name comes from the VENDOR_TABS config — not from the sheet data.
   Tab layout: at least a date column + a cost column (other columns ignored).
──────────────────────────────────────────────────────────────────────────── */
function parseVendorTab(raw, vendorName) {
  if (!raw || raw.length < 2) return [];

  // Find the header row (first row within the top 5 that has date or cost keywords)
  let hdrIdx = -1;
  for (let i = 0; i < Math.min(raw.length, 5); i++) {
    const lower = raw[i].map(c => String(c).toLowerCase().trim());
    const hasDate = lower.some(n => n === 'date' || n === 'day' || n.startsWith('day'));
    const hasCost = lower.some(n => n.includes('cost') || n.includes('spend') || n.includes('amount'));
    if (hasDate || hasCost) { hdrIdx = i; break; }
  }
  if (hdrIdx === -1) hdrIdx = 0; // fallback: treat row 0 as header

  const rawHeader = raw[hdrIdx].map(c => String(c).replace(/^\uFEFF/, '').trim());
  const header    = rawHeader.map(c => c.toLowerCase());

  const dI = findColIdx(header, rawHeader, DATE_COL,
    n => n === 'date', n => n === 'day', n => n.startsWith('day'));
  const mI = findColIdx(header, rawHeader, null,
    n => n === 'month', n => n.includes('month'));
  const cI = findColIdx(header, rawHeader, COST_COL,
    n => n.includes('cost') || n.includes('spend') || n.includes('amount'));

  const dateIdx  = dI !== -1 ? dI : 0;
  const monthIdx = mI;
  const costIdx  = cI !== -1 ? cI : (dateIdx === 0 ? 1 : 0);

  console.log(`[${vendorName}] columns → date:"${rawHeader[dateIdx]}" cost:"${rawHeader[costIdx]}"`);

  const rows = [];
  for (let r = hdrIdx + 1; r < raw.length; r++) {
    const row = raw[r];
    let d = parseDate(String(row[dateIdx] || '').trim());
    if (!d || d.getFullYear() < 2010 || d.getFullYear() > 2040) {
      const dayNum = parseInt(String(row[dateIdx] || '1'), 10);
      const mStr   = monthIdx !== -1 ? String(row[monthIdx] || '') : null;
      d = dateFromMonthAndDay(mStr, dayNum);
    }
    if (!d || d.getFullYear() < 2010 || d.getFullYear() > 2040) continue;
    const cost = parseFloat(String(row[costIdx] || '0').replace(/[$,\s]/g, '')) || 0;
    rows.push({ date: d, dateKey: fmtDate(d), vendor: vendorName, cost });
  }
  return rows;
}

/* ── loadMultiTab ─────────────────────────────────────────────────────────────
   Fetch all VENDOR_TABS in parallel. Returns combined rows + per-tab status.
──────────────────────────────────────────────────────────────────────────── */
async function loadMultiTab() {
  const settled = await Promise.allSettled(
    VENDOR_TABS.map(async tab => {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tab.sheetName)}`;
      const text = await fetchCSV(url);
      const raw  = Papa.parse(text, { skipEmptyLines: false }).data;
      const rows = parseVendorTab(raw, tab.vendor);
      return { tab, rows };
    })
  );

  const combined  = [];
  const tabStatus = [];
  for (let i = 0; i < settled.length; i++) {
    const r   = settled[i];
    const tab = VENDOR_TABS[i];
    if (r.status === 'fulfilled') {
      combined.push(...r.value.rows);
      tabStatus.push({ vendor: tab.vendor, sheet: tab.sheetName, rows: r.value.rows.length, ok: true });
      console.log(`✓ [${tab.vendor}] "${tab.sheetName}": ${r.value.rows.length} rows`);
    } else {
      tabStatus.push({ vendor: tab.vendor, sheet: tab.sheetName, rows: 0, ok: false, err: r.reason?.message });
      console.warn(`✗ [${tab.vendor}] "${tab.sheetName}" failed:`, r.reason?.message);
    }
  }
  return { combined, tabStatus };
}

/* ── parseSheet ──────────────────────────────────────────────────────────────
   Handles two layouts automatically:

   WIDE  (Supermetrics pivot):  row 0 = date headers, col 0 = vendor names
         Example header: ["Vendor","01/03/2026","02/03/2026",…]
         Data rows:       ["Google", 1200, 3400, …]

   LONG  (tidy format):         columns are Day, Month, Vendor, Cost
         Example header: ["Day","Month","Vendor","Cost (USD)"]
         Data rows:       ["15","January 2025","Google","1234"]
──────────────────────────────────────────────────────────────────────────── */
function parseSheet(result) {
  // ── Embedded data (array-of-objects) → legacy long-format path ────────────
  if (!result.isRaw) {
    return parseLongObjects(result.data, result.meta.fields || []);
  }

  // ── Raw 2D array ──────────────────────────────────────────────────────────
  // Filter completely blank rows but keep row indices intact for header search
  const raw = result.data;
  console.log('Raw rows (first 4):', JSON.stringify(raw.slice(0, 4)));

  // Find the first row that has ≥2 parseable dates → that's the date-header row
  // for WIDE format. Also check for long-format column name rows.
  let wideHeaderIdx = -1, longHeaderIdx = -1;

  for (let i = 0; i < Math.min(raw.length, 8); i++) {
    const row = raw[i];
    // Count how many cells parse as valid dates (year > 2010)
    const dateCells = row.filter(c => {
      const d = parseDate(String(c).trim());
      return d && d.getFullYear() > 2010;
    });
    if (dateCells.length >= 2 && wideHeaderIdx === -1) {
      wideHeaderIdx = i;
    }
    // Check for long-format column names
    const lower = row.map(c => String(c).toLowerCase().trim());
    const hasVendorCol = lower.some(n =>
      n === 'platform' || n.includes('vendor') || n.includes('source') ||
      n === 'network'  || n.includes('channel'));
    const hasDateCol   = lower.some(n => n === 'day' || n === 'date' || n === 'month');
    if ((hasVendorCol || hasDateCol) && longHeaderIdx === -1) {
      longHeaderIdx = i;
    }
  }

  console.log('Format detection →', { wideHeaderIdx, longHeaderIdx });

  // ── Attempt WIDE format first ─────────────────────────────────────────────
  if (wideHeaderIdx !== -1) {
    const headerRow = raw[wideHeaderIdx];

    // Map column index → date
    const dateCols = [];
    for (let c = 0; c < headerRow.length; c++) {
      const d = parseDate(String(headerRow[c]).trim());
      if (d && d.getFullYear() > 2010) dateCols.push({ c, date: d });
    }

    // Vendor column: first non-date, non-empty column in the header row
    let vendorCol = headerRow.findIndex((cell, idx) => {
      const s = String(cell).trim();
      if (!s) return false;
      const d = parseDate(s);
      return !d || d.getFullYear() <= 2010; // not a date = likely label col
    });
    if (vendorCol === -1) vendorCol = 0;

    const rows = [];
    for (let r = wideHeaderIdx + 1; r < raw.length; r++) {
      const dataRow = raw[r];
      const vendor  = String(dataRow[vendorCol] || '').trim();
      if (!vendor) continue;
      // Skip summary/total rows
      if (/^total$/i.test(vendor) || /^grand/i.test(vendor)) continue;

      for (const { c, date } of dateCols) {
        const cost = parseFloat(String(dataRow[c] || '0').replace(/[$,\s%]/g, '')) || 0;
        rows.push({ date, dateKey: fmtDate(date), vendor, cost });
      }
    }

    if (rows.length > 0) {
      console.log(`WIDE format: ${rows.length} rows from ${dateCols.length} date columns`);
      return rows;
    }
  }

  // ── Attempt LONG format ───────────────────────────────────────────────────
  if (longHeaderIdx !== -1) {
    const rawHeader = raw[longHeaderIdx].map(c => String(c).replace(/^\uFEFF/, '').trim());
    const header    = rawHeader.map(c => c.toLowerCase());

    // Resolve each column: explicit override wins, then matchers in priority order
    const dI = findColIdx(header, rawHeader, DATE_COL,
      n => n === 'date',
      n => n === 'day',
      n => n.startsWith('day')
    );
    const mI = findColIdx(header, rawHeader, null,
      n => n === 'month',
      n => n.includes('month')
    );
    // Vendor priority: Channel L3 > Channel L2 > vendor/network > platform > any channel
    const vI = findColIdx(header, rawHeader, VENDOR_COL,
      n => n.includes('channel') && n.includes('3'),
      n => n.includes('channel') && n.includes('2'),
      n => n === 'vendor' || n === 'network' || n === 'source',
      n => n.includes('vendor') || n.includes('network') || n.includes('source'),
      n => n === 'platform' || n.includes('platform'),
      n => n.includes('channel')
    );
    const cI = findColIdx(header, rawHeader, COST_COL,
      n => n.includes('cost') || n.includes('spend') || n.includes('amount')
    );

    const dateIdx   = dI !== -1 ? dI : 0;
    const monthIdx  = mI;
    const vendorIdx = vI !== -1 ? vI : 2;
    const costIdx   = cI !== -1 ? cI : 3;

    console.log('Long-format columns →', {
      date:   rawHeader[dateIdx],
      vendor: rawHeader[vendorIdx],
      cost:   rawHeader[costIdx],
      month:  monthIdx !== -1 ? rawHeader[monthIdx] : '(none)',
    });

    // Populate column inspector data
    lastColInfo = {
      date:    rawHeader[dateIdx]   || `col[${dateIdx}]`,
      vendor:  rawHeader[vendorIdx] || `col[${vendorIdx}]`,
      cost:    rawHeader[costIdx]   || `col[${costIdx}]`,
      allCols: rawHeader,
    };

    const rows = [];
    for (let r = longHeaderIdx + 1; r < raw.length; r++) {
      const row = raw[r];
      let d = parseDate(String(row[dateIdx] || '').trim());
      if (!d || d.getFullYear() < 2010 || d.getFullYear() > 2040) {
        const dayNum = parseInt(String(row[dateIdx] || '1'), 10);
        const mStr   = monthIdx !== -1 ? String(row[monthIdx] || '') : null;
        d = dateFromMonthAndDay(mStr, dayNum);
      }
      if (!d || d.getFullYear() < 2010 || d.getFullYear() > 2040) continue;
      const rawVendor = String(row[vendorIdx] || '').trim();
      if (!rawVendor) continue;
      // Apply aliases (e.g. 'Facebook Cost' → 'Meta')
      const vendor = VENDOR_ALIASES[rawVendor] ?? VENDOR_ALIASES[rawVendor.toLowerCase()] ?? rawVendor;
      const cost = parseFloat(String(row[costIdx] || '0').replace(/[$,\s]/g, '')) || 0;
      rows.push({ date: d, dateKey: fmtDate(d), vendor, cost });
    }

    if (rows.length > 0) {
      console.log(`LONG format: ${rows.length} rows`);
      return rows;
    }
  }

  console.warn('Could not parse sheet — neither wide nor long format detected.');
  return [];
}

/* Legacy path for embedded data (array-of-objects) */
function parseLongObjects(data, fields) {
  let dayCol, monthCol, vendorCol, costCol;
  for (const f of fields) {
    const n = f.replace(/^\uFEFF/, '').toLowerCase().trim();
    if (!dayCol    && (n === 'day' || n === 'date' || n.startsWith('day'))) dayCol = f;
    if (!monthCol  && (n === 'month' || n.includes('month'))) monthCol = f;
    if (!vendorCol && (n === 'platform' || n === 'vendor' || n === 'network' || n === 'source' || n.includes('platform') || n.includes('vendor') || n.includes('source'))) vendorCol = f;
    if (!costCol   && (n.includes('cost') || n.includes('spend') || n.includes('amount'))) costCol = f;
  }
  if (!dayCol)    dayCol    = fields[0];
  if (!vendorCol) vendorCol = fields[2];
  if (!costCol)   costCol   = fields[3];

  const rows = [];
  for (const r of data) {
    let d = parseDate(r[dayCol]);
    if (!d || d.getFullYear() < 2010 || d.getFullYear() > 2040) {
      d = dateFromMonthAndDay(monthCol ? r[monthCol] : null, parseInt(String(r[dayCol] || '1'), 10));
    }
    if (!d || d.getFullYear() < 2010 || d.getFullYear() > 2040) continue;
    const vendor = String(r[vendorCol] || '').trim();
    if (!vendor) continue;
    const cost = parseFloat(String(r[costCol] || '0').replace(/[$,\s]/g, '')) || 0;
    rows.push({ date: d, dateKey: fmtDate(d), vendor, cost });
  }
  return rows;
}

/* ─────────────────────────────────────────────────
   AGGREGATE
───────────────────────────────────────────────── */
function aggregate(rows, start, end, gran, vendors) {
  const s = new Date(start), e = new Date(end);
  e.setHours(23,59,59);
  const filtered = rows.filter(r =>
    r.date >= s && r.date <= e && vendors.has(r.vendor)
  );

  const buckets = {}; // periodKey -> { vendor: cost }
  const order   = [];

  for (const r of filtered) {
    const key = gran === 'daily'   ? r.dateKey
              : gran === 'weekly'  ? getWeekKey(r.date)
              : monthKey(r.date);
    if (!buckets[key]) { buckets[key] = {}; order.push(key); }
    buckets[key][r.vendor] = (buckets[key][r.vendor] || 0) + r.cost;
  }
  order.sort();

  const labels = order.map(k =>
    gran === 'daily'  ? dayLabel(k)
  : gran === 'weekly' ? weekLabel(k)
  : monthLabel(k)
  );

  return { buckets, order, labels };
}

function renderKPIs() {

  const rows = allRows.filter(r =>

  );

  const total   = rows.reduce((s,r) => s + r.cost, 0);

  const dots = sorted.map(([v]) =>

  document.getElementById('kpiRow').innerHTML = `

  document.getElementById('tablePeriod').textContent =
    `${start.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} — ` +

───────────────────────────────────────────────── */
function renderChips(vendors) {
  const el = document.getElementById('vendorChips');
  el.innerHTML = vendors.map(v => `
    <div class="vchip active" data-v="${v}"
         style="border-color:${colorMap[v]};color:${colorMap[v]}">
      <span class="vchip-dot" style="background:${colorMap[v]}"></span>
      ${v}
    </div>`).join('');

  el.querySelectorAll('.vchip').forEach(chip => {
    chip.addEventListener('click', () => {
      const v = chip.dataset.v;
      if (activeVendors.has(v)) {
        if (activeVendors.size === 1) return;
        activeVendors.delete(v);
        chip.classList.replace('active','inactive');

        activeVendors.add(v);
        chip.classList.replace('inactive','active');
      }
      renderAll();
    });
  });
}

/* ─────────────────────────────────────────────────
   RENDER ALL
───────────────────────────────────────────────── */
function renderAll() {
  if (!allRows.length) return;
  renderKPIs();
  renderChart();
  renderTable();
}

/* ─────────────────────────────────────────────────
   DATE SHORTCUTS
───────────────────────────────────────────────── */
function applyShortcut(days) {
  const dates = allRows.map(r => r.date);
  const maxD  = new Date(Math.max(...dates));
  let   minD;
  if (days === 0) {
    minD = new Date(Math.min(...dates));
  } else {
    minD = new Date(maxD);
    minD.setDate(minD.getDate() - (days - 1));
  }
  document.getElementById('startDate').value = fmtDate(minD);
  document.getElementById('endDate').value   = fmtDate(maxD);
  renderAll();
}

/* ─────────────────────────────────────────────────
   INIT
───────────────────────────────────────────────── */
async function init() {
  lastColInfo   = null;
  lastTabStatus = null;
  document.getElementById('colInspector').classList.remove('visible');
  document.getElementById('fetchBadge').textContent = 'Loading...';
  document.getElementById('kpiRow').innerHTML =
    '<div class="loader"><div class="spinner"></div> Fetching vendor tabs…</div>';
  document.getElementById('vendorChips').innerHTML = '';
  document.getElementById('tableWrap').innerHTML   = '';
  if (chartInst) { chartInst.destroy(); chartInst = null; }

  try {
    // ── Step 1: try multi-tab fetch (one tab per vendor) ────────────────────
    let rows = [];
    let tabStatus = null;

    try {
      const mt = await loadMultiTab();
      rows      = mt.combined;
      tabStatus = mt.tabStatus;
    } catch (e) {
      console.warn('Multi-tab load error:', e.message);
    }

    // ── Step 2: fallback to "All cost" tab if multi-tab returned nothing ────
    if (!rows.length) {
      console.log('Multi-tab returned 0 rows — falling back to "All cost" tab');
      document.getElementById('kpiRow').innerHTML =
        '<div class="loader"><div class="spinner"></div> Vendor tabs unavailable, loading All cost tab…</div>';
      const results = await loadSheet();
      rows = parseSheet(results);
    }

    allRows = rows;

    if (!allRows.length) {
      document.getElementById('kpiRow').innerHTML = `
        <div class="error-box">
          <strong>No data found.</strong> All vendor tabs loaded but returned zero rows.<br><br>
          Check that the Google Sheet is set to <strong>"Anyone with the link can view"</strong>
          and that the tab names in VENDOR_TABS match exactly.
        </div>`;
      return;
    }

    // ── Step 3: build vendor list + color map ───────────────────────────────
    const vendors = [...new Set(allRows.map(r => r.vendor))].sort();
    colorMap      = {};
    activeVendors = new Set(vendors);
    vendors.forEach((v, i) => { colorMap[v] = vendorColor(v, i); });

    // ── Step 4: default date range = current month (1st → yesterday) ────────
    const dates    = allRows.map(r => r.date);
    const maxDate  = new Date(Math.max(...dates));
    const minDate  = new Date(Math.min(...dates));
    const today    = new Date();
    const yesterday = new Date(Date.UTC(today.getFullYear(), today.getMonth(), today.getDate() - 1));
    const monthStart = new Date(Date.UTC(today.getFullYear(), today.getMonth(), 1));

    // Check if any rows fall in the current month up to yesterday
    const hasCurrentMonth = allRows.some(r => r.date >= monthStart && r.date <= yesterday);
    let defStart, defEnd;
    if (hasCurrentMonth) {
      defStart = monthStart;
      defEnd   = yesterday <= maxDate ? yesterday : maxDate;
    } else {
      // Fallback: last 30 days of available data
      defEnd   = maxDate;
      defStart = new Date(maxDate); defStart.setDate(defStart.getDate() - 29);
      if (defStart < minDate) defStart = minDate;
    }
    document.getElementById('startDate').value = fmtDate(defStart);
    document.getElementById('endDate').value   = fmtDate(defEnd);

    renderChips(vendors);
    renderAll();

    // ── Step 5: inspector bar ───────────────────────────────────────────────
    const ci = document.getElementById('colInspector');
    if (tabStatus) {
      // Multi-tab mode: show per-vendor load status
      lastTabStatus = tabStatus;
      const chips = tabStatus.map(t => {
        const cls = t.ok ? 'ok' : 'fail';
        const lbl = t.ok ? `${t.vendor} (${t.rows.toLocaleString()})` : `${t.vendor} ✗`;
        return `<span class="ci-tab-chip ${cls}" title="${t.sheet}${t.err ? ' — ' + t.err : ''}">
                  <span class="ci-tab-chip-dot"></span>${lbl}
                </span>`;
      }).join(' ');
      const loaded = tabStatus.filter(t => t.ok).length;
      const total  = tabStatus.length;
      ci.innerHTML = `
        <span class="ci-label">Tabs</span>
        <span style="color:var(--text-2)">${loaded}/${total} loaded &nbsp;·&nbsp; ${allRows.length.toLocaleString()} rows</span>
        <span class="ci-sep">&nbsp;·&nbsp;</span>
        ${chips}
      `;
      ci.classList.add('visible');
    } else if (lastColInfo) {
      // Fallback mode: show column detection info
      const allColsHtml = lastColInfo.allCols
        .map((c, i) => `<span class="ci-val" title="index ${i}">${(c || '(empty)').replace(/</g,'&lt;')}</span>`)
        .join(' ');
      ci.innerHTML = `
        <span class="ci-label">Fallback mode</span>
        <span class="ci-val" title="date column">Date: ${lastColInfo.date}</span>
        <span class="ci-sep">&nbsp;·&nbsp;</span>
        <span class="ci-val" title="vendor column">Vendor: ${lastColInfo.vendor}</span>
        <span class="ci-sep">&nbsp;·&nbsp;</span>
        <span class="ci-val" title="cost column">Cost: ${lastColInfo.cost}</span>
        <span class="ci-sep">&nbsp;·&nbsp;</span>
        <span>${allRows.length.toLocaleString()} rows loaded</span>
        <button class="ci-toggle" id="ciToggle">All columns ▾</button>
        <div class="ci-all-cols" id="ciAllCols">${allColsHtml}</div>
      `;
      ci.classList.add('visible');
      document.getElementById('ciToggle').addEventListener('click', () => {
        const d = document.getElementById('ciAllCols');
        d.classList.toggle('open');
        document.getElementById('ciToggle').textContent =
          d.classList.contains('open') ? 'Hide ▴' : 'All columns ▾';
      });
    }

    document.getElementById('fetchBadge').textContent =
      `Updated ${new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}`;

  } catch (err) {
    console.error(err);
    document.getElementById('kpiRow').innerHTML = `
      <div class="error-box">
        <strong>Failed to load data.</strong><br/>
        ${err.message || err}<br/><br/>
        Make sure the sheet is set to <strong>"Anyone with the link can view"</strong>
        and open this file in a browser (not as a local file:// URL — use a local server or GitHub Pages).
      </div>`;
    document.getElementById('fetchBadge').textContent = 'Error';
  }
}

/* ─────────────────────────────────────────────────
   EVENT LISTENERS
───────────────────────────────────────────────── */
document.getElementById('startDate').addEventListener('change', renderAll);
document.getElementById('endDate').addEventListener('change', renderAll);

document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    granularity = btn.dataset.gran;
    renderAll();
  });
});

document.querySelectorAll('.shortcut-btn').forEach(btn => {
  btn.addEventListener('click', () => applyShortcut(+btn.dataset.days));
});

document.getElementById('refreshBtn').addEventListener('click', () => {
  allRows = []; activeVendors = new Set(); colorMap = {};
  init();
});

// Start
init();
</script>
</body>
</html>
